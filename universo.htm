<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Un Universo Para Ti</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    width: 100vw;
  }

  #inicio {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #1b0033 0%, #000000 80%);
    z-index: 10;
    transition: opacity 1.5s ease;
  }

  #inicio h1 {
    color: #f5d0ff;
    font-size: 1.8em;
    text-shadow: 0 0 20px #d68bff, 0 0 40px #a06bff;
    margin-bottom: 30px;
    text-align: center;
    padding: 0 20px;
    animation: pulso 3s infinite ease-in-out;
  }

  @keyframes pulso {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 1; }
  }

  #botonEntrar {
    padding: 15px 40px;
    font-size: 1.1em;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ff9bd6, #a06bff);
    color: white;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(255, 155, 214, 0.7);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  #botonEntrar:hover {
    transform: scale(1.08);
    box-shadow: 0 0 40px rgba(255, 155, 214, 1);
  }

  .oculto {
    opacity: 0;
    pointer-events: none;
  }

  #galaxia {
    position: fixed;
    inset: 0;
    background: #000000;
    opacity: 0;
    transition: opacity 2.5s ease;
  }

  #galaxia.visible {
    opacity: 1;
  }

  #lienzo {
    position: absolute;
    inset: 0;
    display: block;
  }

  .estrella-cursor {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 10px 4px #ffd9f5;
    pointer-events: none;
    animation: aparecerEstrella 1.2s ease-out forwards;
    z-index: 3;
  }

  @keyframes aparecerEstrella {
    0% { opacity: 1; transform: scale(0.3); }
    70% { opacity: 1; transform: scale(1.5); }
    100% { opacity: 0; transform: scale(0.6); }
  }

  .mensaje {
    position: absolute;
    color: #ffe9fb;
    font-size: 1em;
    font-weight: 600;
    white-space: nowrap;
    pointer-events: none;
    animation: subirMensaje 2.5s ease-out forwards, brillarTexto 0.9s ease-in-out infinite alternate;
    z-index: 3;
  }

  @keyframes brillarTexto {
    0%   { text-shadow: 0 0 10px #ff9bd6, 0 0 18px rgba(255,155,214,0.6), 0 0 28px rgba(160,107,255,0.4); }
    100% { text-shadow: 0 0 22px #ffffff, 0 0 40px #ff9bd6, 0 0 65px #d68bff, 0 0 90px rgba(214,139,255,0.6); }
  }

  @keyframes subirMensaje {
    0% { opacity: 0; transform: translateY(10px) scale(0.95); }
    20% { opacity: 1; transform: translateY(0) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-40px) scale(1.03); }
  }

  #titulo-galaxia {
    position: fixed;
    top: 25px;
    width: 100%;
    text-align: center;
    color: #f5d0ff;
    text-shadow: 0 0 15px #d68bff, 0 0 30px rgba(214,139,255,0.5);
    font-size: 1.2em;
    font-weight: 600;
    z-index: 5;
    pointer-events: none;
  }

  #botonMusica {
    position: fixed;
    bottom: 26px;
    right: 26px;
    width: 92px;
    height: 92px;
    border: none;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(255,155,214,0.35), rgba(160,107,255,0.15));
    box-shadow: 0 0 25px rgba(214, 139, 255, 0.55), 0 0 45px rgba(255, 155, 214, 0.3);
    cursor: pointer;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  #botonMusica:hover {
    transform: scale(1.08);
    box-shadow: 0 0 35px rgba(214, 139, 255, 0.8), 0 0 60px rgba(255, 155, 214, 0.45);
  }

  .iconoPlay {
    font-size: 2.6em;
    line-height: 1;
    pointer-events: none;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
  }
</style>
</head>
<body>

  <div id="inicio">
    <h1>Antes de entrar a esta galaxia...<br>prepárate para algo bonito ✨</h1>
    <button id="botonEntrar">Entrar al universo 💫</button>
  </div>

  <div id="galaxia">
    <canvas id="lienzo"></canvas>
    <p id="titulo-galaxia">Toca y desliza por la pantalla 💜</p>
  </div>

  <button id="botonMusica" aria-label="Reproducir canción">
    <span class="iconoPlay" id="iconoPlay">▶️</span>
  </button>

  <!--
    ======================================================================
    REEMPLAZA la URL de abajo por el enlace jsDelivr de TU mp3 en GitHub.
    Instrucciones completas al final del mensaje del chat.
    ======================================================================
  -->
  <audio id="audioCancion" preload="none" loop>
    <source src="https://cdn.jsdelivr.net/gh/diegoenriquecastroarroyo-ux/universo@main/ACARICIAME.mp3" type="audio/mpeg">
  </audio>

<script>
  const inicio = document.getElementById('inicio');
  const galaxia = document.getElementById('galaxia');
  const boton = document.getElementById('botonEntrar');
  const canvas = document.getElementById('lienzo');
  const ctx = canvas.getContext('2d');

  const objetosEspacio = [
    "estrella", "galaxia", "nebulosa", "luna", "constelación", "cometa",
    "supernova", "aurora", "vía láctea", "estrella fugaz", "atardecer cósmico",
    "nube estelar", "eclipse", "sistema solar", "planeta", "polvo estelar",
    "luz de estrella", "brillo del cielo", "cielo nocturno", "horizonte estelar"
  ];

  const corazones = ["💖", "💕", "❤️", "💗", "💓", "💘", "🩷", "💞", "♥️", "🫶", "💜", "✨❤️"];

  const plantillas = [
    o => `Cada ${o} brilla como tú ${'{c}'}`,
    o => `Eres mi ${o} favorita ${'{c}'}`,
    o => `Contigo hasta el cielo se ve más bonito ${'{c}'}`,
    o => `Un pedacito de ${o} para ti, Aketzally ${'{c}'}`,
    o => `Brillas más que cualquier ${o} ${'{c}'}`,
    o => `Mi universo entero cabe en tu sonrisa, Aketzally ${'{c}'}`,
    o => `Gracias por iluminar mis días como una ${o} ${'{c}'}`,
    o => `Contigo todo se siente mágico ${'{c}'}`,
    o => `Eres mi ${o} favorita en todo el cielo, Aketzally ${'{c}'}`,
    o => `Cada momento contigo brilla distinto ${'{c}'}`,
    o => `Ninguna ${o} se compara con tu luz ${'{c}'}`,
    o => `Quiero enseñarte cada ${o} que existe ${'{c}'}`,
    o => `Contigo hasta una simple ${o} se vuelve especial ${'{c}'}`,
    o => `Eres la razón por la que miro el cielo, Aketzally ${'{c}'}`,
    o => `Tu sonrisa ilumina más que cualquier ${o} ${'{c}'}`,
    o => `Si pudiera, te regalaría una ${o} de verdad ${'{c}'}`,
    o => `Contigo el universo se siente más pequeño y más nuestro ${'{c}'}`,
    o => `Cada ${o} que ves aquí es un pedacito de cariño, Aketzally ${'{c}'}`,
    o => `Me encanta perderme en tus ojos como en una ${o} ${'{c}'}`,
    o => `Nunca había visto algo tan bonito como tú, ni una ${o} ${'{c}'}`,
    o => `Contigo cada ${o} tiene más sentido ${'{c}'}`,
    o => `Esta ${o} apareció solo porque tú la mereces, Aketzally ${'{c}'}`,
    o => `Eres mi lugar favorito en todo este universo ${'{c}'}`,
    o => `Ojalá pudieras ver lo bonita que eres, como una ${o} ${'{c}'}`,
    o => `Cada vez que te muevas, aparecerá algo bonito para ti, Aketzally ${'{c}'}`
  ];

  function generarMensajes(cantidadMinima) {
    const pares = [];
    plantillas.forEach((plantilla, pi) => {
      objetosEspacio.forEach((obj, oi) => {
        pares.push([pi, oi]);
      });
    });
    for (let i = pares.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pares[i], pares[j]] = [pares[j], pares[i]];
    }
    const total = Math.min(Math.max(cantidadMinima, 300), pares.length);
    const combinaciones = [];
    for (let i = 0; i < total; i++) {
      const [pi, oi] = pares[i];
      const cor = corazones[Math.floor(Math.random() * corazones.length)];
      combinaciones.push(plantillas[pi](objetosEspacio[oi]).replace('{c}', cor));
    }
    return combinaciones;
  }

  const mensajes = generarMensajes(300);
  let bolsaMensajes = [];
  function siguienteMensaje() {
    if (bolsaMensajes.length === 0) {
      bolsaMensajes = [...mensajes];
      for (let i = bolsaMensajes.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [bolsaMensajes[i], bolsaMensajes[j]] = [bolsaMensajes[j], bolsaMensajes[i]];
      }
    }
    return bolsaMensajes.pop();
  }

  let W, H, cx, cy, escala;
  let bloomCanvas, bloomCtx, bloomW, bloomH;

  function ajustarTamano() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2;
    cy = H / 2;
    escala = Math.min(W, H) * 0.46;

    bloomW = Math.max(1, Math.floor(W / 5));
    bloomH = Math.max(1, Math.floor(H / 5));
    if (!bloomCanvas) {
      bloomCanvas = document.createElement('canvas');
      bloomCtx = bloomCanvas.getContext('2d');
    }
    bloomCanvas.width = bloomW;
    bloomCanvas.height = bloomH;
  }
  ajustarTamano();
  window.addEventListener('resize', ajustarTamano);

  const INCLINACION = -0.42;
  const APLANADO = 0.42;

  function gauss(desv) {
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v) * desv;
  }

  const grano = document.createElement('canvas');
  grano.width = 160; grano.height = 160;
  (function generarGrano() {
    const gctx = grano.getContext('2d');
    const img = gctx.createImageData(160, 160);
    for (let i = 0; i < img.data.length; i += 4) {
      const v = Math.random() * 255;
      img.data[i] = v; img.data[i+1] = v; img.data[i+2] = v; img.data[i+3] = 18;
    }
    gctx.putImageData(img, 0, 0);
  })();
  let granoPattern = null;

  const fondo = [];
  for (let i = 0; i < 550; i++) {
    const r = Math.random();
    let color = '255,255,255';
    if (r < 0.1) color = '255,220,180';
    else if (r < 0.2) color = '190,210,255';
    const profundidad = Math.random() * 0.6 + 0.15;
    fondo.push({
      x: Math.random() * W - W/2,
      y: Math.random() * H - H/2,
      profundidad,
      r: Math.random() * 1.4 + 0.3,
      color,
      fase: Math.random() * Math.PI * 2,
      vel: Math.random() * 0.02 + 0.008,
      vx: (Math.random() - 0.5) * 0.05 * profundidad,
      vy: (Math.random() - 0.5) * 0.05 * profundidad + 0.015 * profundidad
    });
  }

  const galaxiasFondo = [];
  const coloresGalFondo = ['180,190,255', '255,190,220', '190,230,255', '210,170,255'];
  for (let i = 0; i < 5; i++) {
    galaxiasFondo.push({
      x: Math.random() * W,
      y: Math.random() * H,
      tam: Math.random() * 45 + 25,
      color: coloresGalFondo[i % coloresGalFondo.length],
      anguloRot: Math.random() * Math.PI * 2,
      velRot: (Math.random() - 0.5) * 0.0006,
      alpha: Math.random() * 0.12 + 0.08
    });
  }

  const motasPolvo = [];
  for (let i = 0; i < 22; i++) {
    motasPolvo.push({
      x: Math.random() * W,
      y: Math.random() * H,
      tam: Math.random() * 55 + 25,
      vx: (Math.random() - 0.5) * 0.12,
      vy: Math.random() * 0.1 + 0.03,
      alpha: Math.random() * 0.05 + 0.02,
      color: Math.random() < 0.5 ? '200,180,255' : '255,200,225'
    });
  }

  const meteoros = [];
  function lanzarMeteoro() {
    const desdeArriba = Math.random() < 0.5;
    const x0 = Math.random() * W;
    const y0 = desdeArriba ? -20 : Math.random() * H * 0.3;
    const angulo = Math.PI * 0.22 + Math.random() * 0.25;
    const vel = Math.random() * 9 + 10;
    meteoros.push({
      x: x0, y: y0,
      vx: Math.cos(angulo) * vel,
      vy: Math.sin(angulo) * vel,
      vida: 1,
      largo: Math.random() * 60 + 70
    });
  }
  setInterval(() => {
    if (galaxia.classList.contains('visible') && Math.random() < 0.7) lanzarMeteoro();
  }, 2600);

  const NUM_BRAZOS = 4;
  const B = 0.28;
  const particulas = [];
  const NUM_PARTICULAS = 8500;

  function colorPorRadio(t) {
    if (t < 0.12) return [255, 244, 214];
    if (t < 0.35) return [225, 224, 255];
    if (t < 0.7)  return [172, 190, 255];
    return [186, 150, 245];
  }

  for (let i = 0; i < NUM_PARTICULAS; i++) {
    const brazo = i % NUM_BRAZOS;
    const t = Math.pow(Math.random(), 0.85);
    const anguloEspiral = Math.log(1 + t * 8) / B;
    const anguloBase = (brazo / NUM_BRAZOS) * Math.PI * 2 + anguloEspiral;
    const grosor = 0.09 + t * 0.22;
    const anguloFinal = anguloBase + gauss(grosor);
    const radio = t * escala * (0.94 + gauss(0.04));
    const [r0, g0, b0] = colorPorRadio(t);
    const esBrillante = Math.random() < 0.02 && t > 0.1;

    particulas.push({
      anguloBase: anguloFinal,
      radio,
      t,
      tam: esBrillante ? (Math.random() * 1.2 + 1.8) : (Math.random() * 1.3 + (t < 0.12 ? 1.0 : 0.4)),
      fase: Math.random() * Math.PI * 2,
      velTitilo: Math.random() * 0.025 + 0.008,
      color: `${r0},${g0},${b0}`,
      brillante: esBrillante
    });
  }

  const carrilesPolvo = [];
  for (let b = 0; b < NUM_BRAZOS; b++) {
    const puntos = [];
    for (let i = 0; i <= 40; i++) {
      const t = i / 40;
      const anguloEspiral = Math.log(1 + t * 8) / B;
      const angulo = (b / NUM_BRAZOS) * Math.PI * 2 + anguloEspiral - 0.16;
      const radio = t * escala * 0.92;
      puntos.push({ angulo, radio });
    }
    carrilesPolvo.push(puntos);
  }

  const regionesHII = [];
  for (let i = 0; i < 28; i++) {
    const brazo = i % NUM_BRAZOS;
    const t = 0.25 + Math.random() * 0.65;
    const anguloEspiral = Math.log(1 + t * 8) / B;
    const angulo = (brazo / NUM_BRAZOS) * Math.PI * 2 + anguloEspiral + gauss(0.08);
    const radio = t * escala * 0.95;
    regionesHII.push({ angulo, radio, tam: Math.random() * 11 + 8, fase: Math.random() * Math.PI * 2 });
  }

  let mouseX = 0, mouseY = 0;
  let camX = 0, camY = 0;
  window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / W) * 2 - 1;
    mouseY = (e.clientY / H) * 2 - 1;
  });

  let rotacion = 0;
  let tiempo = 0;

  function dibujar() {
    tiempo += 1;

    camX += (mouseX - camX) * 0.03;
    camY += (mouseY - camY) * 0.03;
    const derivaX = camX + Math.sin(tiempo * 0.00045) * 0.35;
    const derivaY = camY + Math.cos(tiempo * 0.00033) * 0.35;

    const zoom = 1 + Math.sin(tiempo * 0.0016) * 0.025;

    ctx.fillStyle = 'rgba(4,2,10,0.4)';
    ctx.fillRect(0, 0, W, H);

    const fondoGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.75);
    fondoGrad.addColorStop(0, 'rgba(16,10,30,0.55)');
    fondoGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = fondoGrad;
    ctx.fillRect(0, 0, W, H);

    galaxiasFondo.forEach(g => {
      g.anguloRot += g.velRot;
      ctx.save();
      ctx.translate(g.x, g.y);
      ctx.rotate(g.anguloRot);
      ctx.scale(1, 0.4);
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, g.tam);
      grad.addColorStop(0, `rgba(${g.color},${g.alpha})`);
      grad.addColorStop(1, `rgba(${g.color},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, g.tam, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    fondo.forEach(e => {
      e.x += e.vx;
      e.y += e.vy;
      if (e.x > W/2) e.x = -W/2; if (e.x < -W/2) e.x = W/2;
      if (e.y > H/2) e.y = -H/2; if (e.y < -H/2) e.y = H/2;

      const brillo = 0.35 + Math.sin(tiempo * e.vel + e.fase) * 0.3 + 0.25;
      const px = cx + e.x + derivaX * 40 * e.profundidad;
      const py = cy + e.y + derivaY * 40 * e.profundidad;
      ctx.beginPath();
      ctx.fillStyle = `rgba(${e.color},${Math.min(brillo, 1)})`;
      ctx.arc(px, py, e.r, 0, Math.PI * 2);
      ctx.fill();
    });

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = meteoros.length - 1; i >= 0; i--) {
      const m = meteoros[i];
      m.x += m.vx; m.y += m.vy; m.vida -= 0.012;
      if (m.vida <= 0 || m.x > W + 100 || m.y > H + 100) { meteoros.splice(i, 1); continue; }
      const ang = Math.atan2(m.vy, m.vx);
      const cola = ctx.createLinearGradient(m.x, m.y, m.x - Math.cos(ang) * m.largo, m.y - Math.sin(ang) * m.largo);
      cola.addColorStop(0, `rgba(255,255,255,${m.vida})`);
      cola.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.strokeStyle = cola;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(m.x - Math.cos(ang) * m.largo, m.y - Math.sin(ang) * m.largo);
      ctx.stroke();
      ctx.beginPath();
      ctx.fillStyle = `rgba(255,255,255,${m.vida})`;
      ctx.arc(m.x, m.y, 1.8, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    ctx.save();
    ctx.translate(cx + derivaX * 18, cy + derivaY * 18);
    ctx.rotate(INCLINACION);
    ctx.scale(zoom, APLANADO * zoom);

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const halo = ctx.createRadialGradient(0, 0, 0, 0, 0, escala);
    halo.addColorStop(0, 'rgba(170,140,255,0.10)');
    halo.addColorStop(1, 'rgba(170,140,255,0)');
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.arc(0, 0, escala, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    ctx.strokeStyle = 'rgba(60,35,45,0.55)';
    carrilesPolvo.forEach(puntos => {
      ctx.beginPath();
      puntos.forEach((p, idx) => {
        const ang = p.angulo + rotacion;
        const x = Math.cos(ang) * p.radio;
        const y = Math.sin(ang) * p.radio;
        ctx.lineWidth = 3 + p.radio / escala * 10;
        if (idx === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();
    });
    ctx.restore();

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const nucleo = ctx.createRadialGradient(0, 0, 0, 0, 0, escala * 0.24);
    nucleo.addColorStop(0, 'rgba(255,250,235,0.95)');
    nucleo.addColorStop(0.35, 'rgba(255,238,210,0.55)');
    nucleo.addColorStop(1, 'rgba(255,230,200,0)');
    ctx.fillStyle = nucleo;
    ctx.beginPath();
    ctx.arc(0, 0, escala * 0.24, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    regionesHII.forEach(r => {
      const ang = r.angulo + rotacion;
      const x = Math.cos(ang) * r.radio;
      const y = Math.sin(ang) * r.radio;
      const brillo = 0.6 + Math.sin(tiempo * 0.02 + r.fase) * 0.25;
      const grad = ctx.createRadialGradient(x, y, 0, x, y, r.tam);
      grad.addColorStop(0, `rgba(255,150,190,${0.5 * brillo})`);
      grad.addColorStop(1, 'rgba(255,150,190,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, r.tam, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.restore();

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    particulas.forEach(p => {
      const ang = p.anguloBase + rotacion;
      const x = Math.cos(ang) * p.radio;
      const y = Math.sin(ang) * p.radio;
      const brillo = 0.5 + Math.sin(tiempo * p.velTitilo + p.fase) * 0.35;
      ctx.beginPath();
      ctx.fillStyle = `rgba(${p.color},${Math.min(Math.max(brillo, 0.15), 1)})`;
      ctx.arc(x, y, p.tam, 0, Math.PI * 2);
      ctx.fill();

      if (p.brillante && brillo > 0.75) {
        ctx.strokeStyle = `rgba(255,255,255,${(brillo - 0.75) * 2})`;
        ctx.lineWidth = 0.6;
        const L = p.tam * 5;
        ctx.beginPath();
        ctx.moveTo(x - L, y); ctx.lineTo(x + L, y);
        ctx.moveTo(x, y - L); ctx.lineTo(x, y + L);
        ctx.stroke();
      }
    });
    ctx.restore();

    ctx.restore();

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    motasPolvo.forEach(mo => {
      mo.x += mo.vx; mo.y += mo.vy;
      if (mo.x < -80) mo.x = W + 80; if (mo.x > W + 80) mo.x = -80;
      if (mo.y < -80) mo.y = H + 80; if (mo.y > H + 80) mo.y = -80;
      const grad = ctx.createRadialGradient(mo.x, mo.y, 0, mo.x, mo.y, mo.tam);
      grad.addColorStop(0, `rgba(${mo.color},${mo.alpha})`);
      grad.addColorStop(1, `rgba(${mo.color},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(mo.x, mo.y, mo.tam, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.restore();

    bloomCtx.clearRect(0, 0, bloomW, bloomH);
    bloomCtx.drawImage(canvas, 0, 0, W, H, 0, 0, bloomW, bloomH);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.filter = 'blur(6px)';
    ctx.globalAlpha = 0.55;
    ctx.drawImage(bloomCanvas, 0, 0, bloomW, bloomH, 0, 0, W, H);
    ctx.filter = 'none';
    ctx.globalAlpha = 1;
    ctx.restore();

    if (!granoPattern) granoPattern = ctx.createPattern(grano, 'repeat');
    ctx.save();
    ctx.globalCompositeOperation = 'overlay';
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = granoPattern;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    const vin = ctx.createRadialGradient(cx, cy, Math.max(W, H) * 0.35, cx, cy, Math.max(W, H) * 0.72);
    vin.addColorStop(0, 'rgba(0,0,0,0)');
    vin.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = vin;
    ctx.fillRect(0, 0, W, H);

    rotacion += 0.0007;
    requestAnimationFrame(dibujar);
  }

  boton.addEventListener('click', () => {
    inicio.classList.add('oculto');
    setTimeout(() => { inicio.style.display = 'none'; }, 1500);
    galaxia.classList.add('visible');
    dibujar();
  });

  let ultimoTiempo = 0;
  document.addEventListener('mousemove', (e) => {
    if (!galaxia.classList.contains('visible')) return;

    const ahora = Date.now();
    if (ahora - ultimoTiempo < 180) return;
    ultimoTiempo = ahora;

    const estrellaCursor = document.createElement('div');
    estrellaCursor.className = 'estrella-cursor';
    estrellaCursor.style.left = e.clientX + 'px';
    estrellaCursor.style.top = e.clientY + 'px';
    galaxia.appendChild(estrellaCursor);
    setTimeout(() => estrellaCursor.remove(), 1200);

    const mensaje = document.createElement('div');
    mensaje.className = 'mensaje';
    mensaje.textContent = siguienteMensaje();
    mensaje.style.left = (e.clientX + 15) + 'px';
    mensaje.style.top = (e.clientY - 10) + 'px';
    galaxia.appendChild(mensaje);
    setTimeout(() => mensaje.remove(), 2500);
  });

  document.addEventListener('touchmove', (e) => {
    if (!galaxia.classList.contains('visible')) return;
    const touch = e.touches[0];
    mouseX = (touch.clientX / W) * 2 - 1;
    mouseY = (touch.clientY / H) * 2 - 1;
    document.dispatchEvent(new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY }));
  });

  // ---- Reproductor de audio (mp3 alojado en GitHub) ----
  const audio = document.getElementById('audioCancion');
  const iconoPlay = document.getElementById('iconoPlay');
  const botonMusica = document.getElementById('botonMusica');
  let reproduciendo = false;

  botonMusica.addEventListener('click', () => {
    if (reproduciendo) {
      audio.pause();
      iconoPlay.textContent = '▶️';
    } else {
      audio.play().catch(err => {
        console.error('No se pudo reproducir el audio:', err);
        alert('No se pudo cargar la canción. Revisa que el enlace del mp3 en el <audio> sea correcto.');
      });
      iconoPlay.textContent = '⏸️';
    }
    reproduciendo = !reproduciendo;
  });
</script>
